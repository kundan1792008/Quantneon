name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'quantneon-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'quantneon-backend/**'

defaults:
  run:
    working-directory: quantneon-backend/quantneon-backend

jobs:
  # ── Test & Build ────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: quantneon
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quantneon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://quantneon:password@localhost:5432/quantneon_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-min-32-characters-long-here
      QUANTMAIL_JWT_SECRET: test-jwt-secret-min-32-characters-long-here
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quantneon-backend/quantneon-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: quantneon-backend/quantneon-backend
          push: true
          tags: |
            quantneon/backend:latest
            quantneon/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
